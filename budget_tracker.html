<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Grant Family Budget</title><link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*,{*::before,*::after{box-sizing:border-box;margin:0;padding:0}:root{--bg:#0a0a09;--bg2:#161614;--bg3:#1e1e1c;--border:#2a2a26;--border2:rgba(255,255,255,0.14);--text:#f0f0ea;--text2:#c8c8c0;--text3:#8a9ab0;--green:#1a9e60;--green-hi:#3dd68c;--red:#d94040;--amber:#e09020;--blue:#4a9ef5;--purple:#9b6ef5;}body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);padding:2rem 1.5rem 5rem;max-width:960px;margin:0 auto;line-height:1.5;}.hdr-title{font-family:'Instrument Serif',serif;font-size:36px;font-weight:400;color:var(--text);letter-spacing:-0.02em;line-height:1.1;margin-bottom:3px;}.hdr-sub{font-size:12px;color:var(--text3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:2rem;}.tabs{display:flex;gap:6px;margin-bottom:2rem;flex-wrap:wrap;}.tab{font-family:'Syne',sans-serif;font-size:11px;font-weight:600;padding:7px 16px;border:1px solid var(--border);border-radius:99px;background:transparent;color:var(--text3);cursor:pointer;letter-spacing:0.04em;transition:all 0.12s;}.tab:hover{color:var(--text2);border-color:#444;}.tab.active{background:var(--text);color:#0a0a09;border-color:var(--text);}.panel{display:none;}.panel.active{display:block;}</style></head><body><div class="hdr-title">Grant Family Budget</div><div class="hdr-sub">Vendor-level actuals · 2025 data + 2026 assumptions · Mar 2026</div><script>function show(id) { document.querySelectorAll('.panel').forEach(p => p.classList.remove('active')); document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('panel-'+id).classList.add('active'); event.target.classList.add('active'); }</script></body></html>
